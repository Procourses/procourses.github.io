<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formation Civique – MCQ Quiz</title>
  <style>
    :root {
      --blue:   #002395;
      --red:    #ED2939;
      --white:  #FFFFFF;
      --light:  #f4f6fb;
      --card:   #ffffff;
      --border: #dde3f0;
      --text:   #1a1a2e;
      --muted:  #6b7280;
      --easy:   #16a34a;
      --medium: #d97706;
      --hard:   #dc2626;
      --correct:#16a34a;
      --wrong:  #dc2626;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--light);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--blue) 0%, #1a3a8f 100%);
      color: var(--white);
      padding: 28px 24px 20px;
      text-align: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 3px 16px rgba(0,35,149,0.35);
    }
    header .flag { font-size: 2rem; margin-bottom: 6px; }
    header h1 { font-size: 1.55rem; font-weight: 700; letter-spacing: .4px; }
    header p  { font-size: .9rem; opacity: .85; margin-top: 4px; }

    /* ── SCORE BAR ── */
    #scorebar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex; align-items: center; justify-content: center; gap: 32px;
      flex-wrap: wrap;
      font-size: .88rem; color: var(--muted);
      position: sticky; top: 97px; z-index: 99;
      box-shadow: var(--shadow);
    }
    #scorebar span { display: flex; align-items: center; gap: 6px; }
    #scorebar b { font-size: 1.1rem; }
    .s-correct b { color: var(--correct); }
    .s-wrong   b { color: var(--wrong); }
    .s-total   b { color: var(--blue); }

    /* ── PROGRESS BAR ── */
    #progress-wrap {
      background: #e5e7eb;
      height: 6px; width: 100%;
    }
    #progress-bar {
      height: 6px;
      background: linear-gradient(90deg, var(--blue), var(--red));
      width: 0%; transition: width .4s ease;
    }

    /* ── TOPIC TABS ── */
    #tabs {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 18px 24px 10px;
      max-width: 1100px; margin: 0 auto;
    }
    .tab-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 2px solid var(--blue);
      background: var(--white);
      color: var(--blue);
      font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .tab-btn:hover, .tab-btn.active {
      background: var(--blue); color: var(--white);
    }

    /* ── CONTROLS ── */
    #controls {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      padding: 0 24px 16px;
      max-width: 1100px; margin: 0 auto;
    }
    #controls label { font-size: .85rem; color: var(--muted); }
    #diff-filter {
      padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border);
      font-size: .85rem; background: var(--white);
    }
    .ctrl-btn {
      padding: 7px 18px; border-radius: 8px;
      border: none; cursor: pointer;
      font-size: .85rem; font-weight: 600;
      transition: opacity .2s;
    }
    .ctrl-btn:hover { opacity: .85; }
    #btn-reveal-all { background: var(--blue);   color: var(--white); }
    #btn-reset-all  { background: var(--red);    color: var(--white); }
    #btn-print      { background: #4b5563;       color: var(--white); }

    /* ── SECTIONS ── */
    .section-wrap {
      max-width: 1100px; margin: 0 auto; padding: 0 24px 40px;
    }
    .section-title {
      font-size: 1.18rem; font-weight: 700;
      color: var(--blue);
      margin: 28px 0 14px;
      padding-bottom: 8px;
      border-bottom: 3px solid var(--red);
      display: flex; align-items: center; gap: 10px;
    }
    .section-title .badge {
      font-size: .72rem; background: var(--red);
      color: var(--white); padding: 2px 8px; border-radius: 10px;
    }

    /* ── QUESTION CARD ── */
    .q-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 22px 18px;
      margin-bottom: 16px;
      box-shadow: var(--shadow);
      transition: box-shadow .2s;
    }
    .q-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.12); }
    .q-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px;
      margin-bottom: 14px;
    }
    .q-num {
      font-size: .78rem; font-weight: 700;
      color: var(--white);
      background: var(--blue);
      border-radius: 50%;
      min-width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .q-text { font-size: .97rem; font-weight: 600; flex: 1; line-height: 1.5; }
    .diff-badge {
      font-size: .7rem; font-weight: 700;
      padding: 3px 10px; border-radius: 10px;
      text-transform: uppercase; flex-shrink: 0;
    }
    .diff-easy   { background: #dcfce7; color: var(--easy); }
    .diff-medium { background: #fef3c7; color: var(--medium); }
    .diff-hard   { background: #fee2e2; color: var(--hard); }

    /* ── OPTIONS ── */
    .options { display: flex; flex-direction: column; gap: 9px; }
    .opt-btn {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 16px;
      border-radius: 10px;
      border: 2px solid var(--border);
      background: var(--white);
      cursor: pointer; text-align: left;
      font-size: .9rem; font-weight: 500;
      transition: all .18s;
    }
    .opt-btn:hover:not(:disabled) {
      border-color: var(--blue);
      background: #eef1fb;
    }
    .opt-btn .opt-label {
      min-width: 26px; height: 26px;
      border-radius: 50%;
      background: var(--light);
      border: 2px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: .78rem; font-weight: 700;
      flex-shrink: 0;
      transition: all .18s;
    }
    .opt-btn.selected { border-color: var(--blue); background: #eef1fb; }
    .opt-btn.selected .opt-label { background: var(--blue); color: var(--white); border-color: var(--blue); }

    .opt-btn.correct { border-color: var(--correct); background: #f0fdf4; }
    .opt-btn.correct .opt-label { background: var(--correct); color: var(--white); border-color: var(--correct); }
    .opt-btn.wrong   { border-color: var(--wrong);   background: #fff1f2; }
    .opt-btn.wrong   .opt-label { background: var(--wrong); color: var(--white); border-color: var(--wrong); }

    .opt-btn:disabled { cursor: default; }

    /* ── FEEDBACK ── */
    .feedback {
      margin-top: 12px; padding: 10px 14px;
      border-radius: 8px; font-size: .87rem; font-weight: 600;
      display: none;
    }
    .feedback.show { display: flex; align-items: center; gap: 8px; }
    .feedback.correct-fb { background: #f0fdf4; color: var(--correct); border: 1px solid #bbf7d0; }
    .feedback.wrong-fb   { background: #fff1f2; color: var(--wrong);   border: 1px solid #fecaca; }

    /* ── REVEAL ANSWER BTN ── */
    .reveal-btn {
      margin-top: 12px;
      padding: 7px 16px;
      border-radius: 8px;
      border: 2px dashed var(--blue);
      background: transparent;
      color: var(--blue);
      font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .reveal-btn:hover { background: var(--blue); color: var(--white); }
    .reveal-btn:disabled { opacity: .4; cursor: default; }

    /* ── ANSWER KEY SECTION ── */
    #answer-key-section {
      max-width: 1100px; margin: 0 auto 40px; padding: 0 24px;
    }
    #answer-key-section h2 {
      font-size: 1.18rem; font-weight: 700; color: var(--blue);
      margin-bottom: 16px; padding-bottom: 8px;
      border-bottom: 3px solid var(--red);
    }
    .key-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
      gap: 8px;
    }
    .key-item {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 8px; padding: 8px 10px;
      font-size: .82rem; text-align: center;
    }
    .key-item b { display: block; font-size: 1rem; color: var(--blue); }

    /* ── STATS CARD ── */
    #stats-section {
      max-width: 1100px; margin: 0 auto 40px; padding: 0 24px;
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 12px;
    }
    .stat-card {
      background: var(--white); border: 1px solid var(--border);
      border-radius: 12px; padding: 16px; text-align: center;
      box-shadow: var(--shadow);
    }
    .stat-card .stat-val { font-size: 1.8rem; font-weight: 800; color: var(--blue); }
    .stat-card .stat-lbl { font-size: .8rem; color: var(--muted); margin-top: 4px; }

    /* ── PRINT ── */
    @media print {
      #scorebar, #tabs, #controls, header { position: static !important; }
      .reveal-btn, .ctrl-btn { display: none !important; }
    }

    /* ── HIDDEN ── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<header>
  <div class="flag">🇫🇷</div>
  <h1>Formation Civique – MCQ Quiz</h1>
  <p>100 Questions &nbsp;|&nbsp; Mixed Difficulty &nbsp;|&nbsp; All Topics Covered</p>
</header>

<div id="scorebar">
  <span class="s-total">📋 Total: <b id="s-total">100</b></span>
  <span class="s-correct">✅ Correct: <b id="s-correct">0</b></span>
  <span class="s-wrong">❌ Wrong: <b id="s-wrong">0</b></span>
  <span>📊 Score: <b id="s-pct">0%</b></span>
  <span>🔍 Answered: <b id="s-answered">0</b> / <b id="s-visible">100</b></span>
</div>
<div id="progress-wrap"><div id="progress-bar"></div></div>

<!-- TABS -->
<div id="tabs">
  <button class="tab-btn active" onclick="filterTopic('all')">All Topics</button>
  <button class="tab-btn" onclick="filterTopic('principles')">Principles &amp; Values</button>
  <button class="tab-btn" onclick="filterTopic('institutional')">Institutional System</button>
  <button class="tab-btn" onclick="filterTopic('rights')">Rights &amp; Duties</button>
  <button class="tab-btn" onclick="filterTopic('history')">History &amp; Culture</button>
  <button class="tab-btn" onclick="filterTopic('parenthood')">Parenthood</button>
  <button class="tab-btn" onclick="filterTopic('review')">Comprehensive Review</button>
</div>

<!-- CONTROLS -->
<div id="controls">
  <label for="diff-filter">Filter by difficulty:</label>
  <select id="diff-filter" onchange="filterDifficulty()">
    <option value="all">All Levels</option>
    <option value="easy">Easy</option>
    <option value="medium">Medium</option>
    <option value="hard">Hard</option>
  </select>
  <button class="ctrl-btn" id="btn-reveal-all" onclick="revealAll()">👁 Reveal All Answers</button>
  <button class="ctrl-btn" id="btn-reset-all"  onclick="resetAll()">🔄 Reset Quiz</button>
  <button class="ctrl-btn" id="btn-print"       onclick="window.print()">🖨 Print</button>
</div>

<!-- QUESTIONS -->
<div class="section-wrap" id="quiz-container"></div>

<!-- ANSWER KEY -->
<div id="answer-key-section">
  <h2>📋 Answer Key</h2>
  <div class="key-grid" id="key-grid"></div>
</div>

<!-- STATS -->
<div id="stats-section">
  <div style="font-size:1.1rem;font-weight:700;color:var(--blue);margin-bottom:14px;padding-bottom:8px;border-bottom:3px solid var(--red);">
    📊 Summary Statistics
  </div>
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-val">100</div><div class="stat-lbl">Total Questions</div></div>
    <div class="stat-card"><div class="stat-val">25</div><div class="stat-lbl">Easy Questions</div></div>
    <div class="stat-card"><div class="stat-val">45</div><div class="stat-lbl">Medium Questions</div></div>
    <div class="stat-card"><div class="stat-val">30</div><div class="stat-lbl">Hard Questions</div></div>
    <div class="stat-card"><div class="stat-val">6</div><div class="stat-lbl">Topics Covered</div></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
//  QUESTION DATA
// ─────────────────────────────────────────────
const questions = [
  // ── PRINCIPLES & VALUES ──
  { id:1,  topic:"principles", diff:"easy",   text:"What is the motto of the French Republic?",
    opts:["Liberty, Equality, Justice","Liberty, Equality, Fraternity","Freedom, Democracy, Unity","Justice, Liberty, Solidarity"], ans:1 },
  { id:2,  topic:"principles", diff:"medium", text:"Which best describes the principle of 'Liberty' in the French Republic?",
    opts:["The right to do whatever one wants without restrictions","Freedom of expression, movement, and thought within the framework of law","Only political freedom without economic considerations","Freedom exclusively for French citizens"], ans:1 },
  { id:3,  topic:"principles", diff:"hard",   text:"The principle of 'Equality' in France is divided into multiple aspects. Which statement accurately reflects one of these aspects?",
    opts:["Equality only applies to economic matters","Equality means identical treatment regardless of individual circumstances","Equality includes equal rights before the law and equal access to public services","Equality excludes considerations of gender differences"], ans:2 },
  { id:4,  topic:"principles", diff:"medium", text:"What does 'Fraternity' represent in French Republican values?",
    opts:["Brotherhood only among family members","Solidarity and mutual support among all members of society","Religious unity among citizens","Military cooperation between nations"], ans:1 },
  { id:5,  topic:"principles", diff:"easy",   text:"The French national flag consists of which three colors?",
    opts:["Red, White, Green","Blue, White, Red","Blue, Yellow, Red","Green, White, Red"], ans:1 },
  { id:6,  topic:"principles", diff:"easy",   text:"What is the name of the French national anthem?",
    opts:["La Marseillaise","La Parisienne","La Française","La République"], ans:0 },
  { id:7,  topic:"principles", diff:"medium", text:"Who or what does 'Marianne' represent in French symbolism?",
    opts:["The first queen of France","A famous French revolutionary","The personification of the French Republic","The patron saint of France"], ans:2 },
  { id:8,  topic:"principles", diff:"easy",   text:"When is the French National Day (Fête Nationale) celebrated?",
    opts:["May 1st","July 14th","November 11th","December 25th"], ans:1 },
  { id:9,  topic:"principles", diff:"hard",   text:"What does the rooster (le coq) symbolize in French culture?",
    opts:["Agricultural heritage only","A national symbol representing vigilance and pride","The royal family's emblem","A religious symbol"], ans:1 },
  { id:10, topic:"principles", diff:"medium", text:"What is the fundamental principle of 'laïcité' in France?",
    opts:["The promotion of atheism in public spaces","The separation of church and state, ensuring religious neutrality","The prohibition of all religious practices","The establishment of one official state religion"], ans:1 },
  { id:11, topic:"principles", diff:"hard",   text:"According to French laïcité principles, what is permitted in public spaces?",
    opts:["Religious proselytism by public officials","Mandatory religious education in public schools","Individual expression of religious beliefs while respecting public order","Display of religious symbols by government representatives"], ans:2 },
  { id:12, topic:"principles", diff:"medium", text:"What is the historical significance of the 1905 law regarding laïcité?",
    opts:["It established Catholicism as the state religion","It formalized the separation of church and state","It banned all religious practices in France","It created a state-controlled church"], ans:1 },
  { id:13, topic:"principles", diff:"hard",   text:"How does laïcité protect individual freedoms in France?",
    opts:["By imposing one secular worldview on all citizens","By ensuring the state does not favor any religion, allowing freedom of conscience","By restricting religious expression to private homes only","By requiring citizens to declare no religious affiliation"], ans:1 },
  { id:14, topic:"principles", diff:"medium", text:"Which institution is responsible for ensuring the application of laïcité in French public schools?",
    opts:["The Church","The National Education Ministry","Local municipalities","Private organizations"], ans:1 },
  { id:15, topic:"principles", diff:"easy",   text:"What does the French Republic's principle of 'indivisibility' mean?",
    opts:["France cannot be divided into regions","All citizens are equal before the law with no distinctions based on origin","France has only one official language","The government cannot be divided into branches"], ans:1 },
  { id:16, topic:"principles", diff:"medium", text:"What is the significance of the Declaration of the Rights of Man and of the Citizen (1789)?",
    opts:["It established the monarchy","It proclaimed fundamental rights and freedoms for all citizens","It created the French army","It defined France's borders"], ans:1 },
  { id:17, topic:"principles", diff:"hard",   text:"How does the French Constitution of 1958 define France?",
    opts:["A constitutional monarchy","An indivisible, secular, democratic and social Republic","A federal state with autonomous regions","A parliamentary monarchy"], ans:1 },
  { id:18, topic:"principles", diff:"medium", text:"What role does the Constitutional Council play in France?",
    opts:["It governs the country","It ensures laws conform to the Constitution","It manages foreign policy","It controls the economy"], ans:1 },
  { id:19, topic:"principles", diff:"easy",   text:"Which principle ensures that all citizens have equal access to public services?",
    opts:["Fraternity","Liberty","Equality","Laïcité"], ans:2 },
  { id:20, topic:"principles", diff:"hard",   text:"What is the concept of 'République sociale' in the French Constitution?",
    opts:["A state with no social programs","A republic that guarantees social rights such as education, health, and work","A communist system","A welfare state without individual rights"], ans:1 },

  // ── INSTITUTIONAL ──
  { id:21, topic:"institutional", diff:"easy",   text:"What type of government does France have?",
    opts:["Constitutional monarchy","Presidential republic","Semi-presidential republic","Parliamentary monarchy"], ans:2 },
  { id:22, topic:"institutional", diff:"medium", text:"Who is the head of state in France?",
    opts:["The Prime Minister","The President of the Republic","The President of the National Assembly","The Speaker of the Senate"], ans:1 },
  { id:23, topic:"institutional", diff:"easy",   text:"How long is the presidential term in France?",
    opts:["4 years","5 years","6 years","7 years"], ans:1 },
  { id:24, topic:"institutional", diff:"medium", text:"What are the two chambers of the French Parliament?",
    opts:["The Senate and the House of Representatives","The National Assembly and the Senate","The Congress and the Senate","The Chamber of Deputies and the Senate"], ans:1 },
  { id:25, topic:"institutional", diff:"hard",   text:"What is the role of the Prime Minister in France?",
    opts:["Head of state and commander of the armed forces","Head of government who directs the government's action","President of the National Assembly","President of the Senate"], ans:1 },
  { id:26, topic:"institutional", diff:"medium", text:"How are members of the National Assembly elected in France?",
    opts:["By proportional representation","By direct universal suffrage in single-member constituencies","By the Senate","By the President"], ans:1 },
  { id:27, topic:"institutional", diff:"hard",   text:"What is the principle of separation of powers in France?",
    opts:["All power is concentrated in the President","Executive, legislative, and judicial powers are separated to prevent abuse","The church has equal power to the state","Regional governments have more power than the central government"], ans:1 },
  { id:28, topic:"institutional", diff:"medium", text:"What is the role of the Constitutional Council in France?",
    opts:["To govern the country when the President is absent","To ensure that laws are constitutional","To manage elections","To control the media"], ans:1 },
  { id:29, topic:"institutional", diff:"easy",   text:"Who appoints the Prime Minister in France?",
    opts:["The National Assembly","The Senate","The President of the Republic","The Constitutional Council"], ans:2 },
  { id:30, topic:"institutional", diff:"hard",   text:"What happens if the National Assembly passes a motion of censure?",
    opts:["The President must resign","The government must resign","New presidential elections are held","The Senate is dissolved"], ans:1 },
  { id:31, topic:"institutional", diff:"medium", text:"What is the role of the Conseil d'État in France?",
    opts:["It is the highest court for civil matters","It advises the government on legislation and is the highest administrative court","It manages the national budget","It controls foreign policy"], ans:1 },
  { id:32, topic:"institutional", diff:"easy",   text:"What does universal suffrage mean in France?",
    opts:["Only property owners can vote","All French citizens aged 18 and over have the right to vote","Only men can vote","Voting is mandatory for all citizens"], ans:1 },
  { id:33, topic:"institutional", diff:"medium", text:"What is the role of the Défenseur des droits in France?",
    opts:["To defend France in international courts","To protect citizens' rights and freedoms against public authorities","To manage immigration","To control the police"], ans:1 },
  { id:34, topic:"institutional", diff:"hard",   text:"How does the French government ensure the principle of 'rule of law' (État de droit)?",
    opts:["By giving the President unlimited powers","By ensuring all authorities are subject to the law","By allowing the government to override court decisions","By concentrating power in the Parliament"], ans:1 },
  { id:35, topic:"institutional", diff:"medium", text:"What is the significance of the French Republic being 'democratic'?",
    opts:["Only elected officials have rights","Citizens participate in governance through elections and referendums","The President makes all decisions alone","The Senate has supreme power"], ans:1 },
  { id:36, topic:"institutional", diff:"easy",   text:"At what age can French citizens vote?",
    opts:["16 years old","18 years old","21 years old","25 years old"], ans:1 },
  { id:37, topic:"institutional", diff:"hard",   text:"What is the difference between the legislative and executive branches in France?",
    opts:["They have the same powers","The legislative branch makes laws; the executive branch implements them","The executive branch makes laws; the legislative branch implements them","There is no distinction"], ans:1 },
  { id:38, topic:"institutional", diff:"medium", text:"Can French citizens living abroad vote in national elections?",
    opts:["No, they must return to France to vote","Yes, they can vote at French consulates or by proxy","Only in presidential elections","Only if they have lived abroad for less than 5 years"], ans:1 },

  // ── RIGHTS & DUTIES ──
  { id:39, topic:"rights", diff:"easy",   text:"What is the minimum voting age in France?",
    opts:["16","18","21","25"], ans:1 },
  { id:40, topic:"rights", diff:"medium", text:"Which of the following is a fundamental right guaranteed by the French Constitution?",
    opts:["The right to unlimited wealth","Freedom of expression","The right to own property without any restrictions","The right to refuse military service under all circumstances"], ans:1 },
  { id:41, topic:"rights", diff:"hard",   text:"What does the right to asylum mean in France?",
    opts:["Any foreigner can automatically obtain French citizenship","Persecuted individuals can request protection in France","France must accept all refugees without conditions","Only EU citizens can request asylum"], ans:1 },
  { id:42, topic:"rights", diff:"medium", text:"What is the principle of presumption of innocence in France?",
    opts:["All accused persons are considered guilty until proven innocent","All accused persons are considered innocent until proven guilty","Only French citizens benefit from this principle","It applies only to minor offenses"], ans:1 },
  { id:43, topic:"rights", diff:"easy",   text:"What is the right to education in France?",
    opts:["Education is optional for all children","Education is compulsory for children from 3 to 16 years old","Education is only compulsory for children from 6 to 14 years old","Education is only available to French citizens"], ans:1 },
  { id:44, topic:"rights", diff:"hard",   text:"What does the right to work (droit au travail) entail in France?",
    opts:["The state must provide a job to every citizen","Citizens have the right to seek employment and the state must support this right","Only French citizens have the right to work","The right to work without any social protections"], ans:1 },
  { id:45, topic:"rights", diff:"medium", text:"What is the role of trade unions (syndicats) in France?",
    opts:["They control the government","They represent and defend workers' rights","They manage national education","They control immigration"], ans:1 },
  { id:46, topic:"rights", diff:"easy",   text:"What is the right to strike in France?",
    opts:["It is prohibited in all sectors","Workers have the right to strike to defend their professional interests","Only civil servants can strike","Strikes are only allowed with government permission"], ans:1 },
  { id:47, topic:"rights", diff:"hard",   text:"What are the limits of freedom of expression in France?",

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let answered = {};   // id → { chosen, correct }
let currentTopic = "all";
let currentDiff  = "all";

// ─────────────────────────────────────────────
//  RENDER
// ─────────────────────────────────────────────
const sections = [
  { key:"principles",   label:"Principles & Values of the Republic",  icon:"🏛️" },
  { key:"institutional",label:"Institutional & Political System",       icon:"⚖️" },
  { key:"rights",       label:"Rights & Duties",                        icon:"📜" },
  { key:"history",      label:"History, Geography & Culture",           icon:"🗺️" },
  { key:"parenthood",   label:"Parenthood",                             icon:"👨‍👩‍👧" },
  { key:"review",       label:"Comprehensive Review",                   icon:"🔄" },
];

function buildQuiz() {
  const container = document.getElementById("quiz-container");
  container.innerHTML = "";

  sections.forEach(sec => {
    const qs = questions.filter(q =>
      q.topic === sec.key &&
      (currentTopic === "all" || q.topic === currentTopic) &&
      (currentDiff  === "all" || q.diff  === currentDiff)
    );
    if (!qs.length) return;

    const secDiv = document.createElement("div");
    secDiv.className = "section-group";
    secDiv.dataset.topic = sec.key;

    const title = document.createElement("div");
    title.className = "section-title";
    title.innerHTML = `${sec.icon} ${sec.label} <span class="badge">${qs.length} Qs</span>`;
    secDiv.appendChild(title);

    qs.forEach(q => {
      secDiv.appendChild(buildCard(q));
    });

    container.appendChild(secDiv);
  });

  buildAnswerKey();
  updateScore();
}

function buildCard(q) {
  const card = document.createElement("div");
  card.className = "q-card";
  card.id = `card-${q.id}`;

  const state = answered[q.id];

  card.innerHTML = `
    <div class="q-header">
      <div class="q-num">${q.id}</div>
      <div class="q-text">${q.text}</div>
      <span class="diff-badge diff-${q.diff}">${q.diff}</span>
    </div>
    <div class="options" id="opts-${q.id}">
      ${q.opts.map((o,i) => `
        <button class="opt-btn ${state ? (i===q.ans?'correct':(i===state.chosen?'wrong':'')) : ''}"
                id="opt-${q.id}-${i}"
                onclick="choose(${q.id},${i})"
                ${state ? 'disabled' : ''}>
          <span class="opt-label">${String.fromCharCode(65+i)}</span>
          ${o}
        </button>`).join('')}
    </div>
    <div class="feedback ${state ? 'show' : ''} ${state ? (state.correct?'correct-fb':'wrong-fb') : ''}" id="fb-${q.id}">
      ${state ? (state.correct ? '✅ Correct!' : `❌ Wrong — Correct answer: <b>${String.fromCharCode(65+q.ans)}</b>`) : ''}
    </div>
    <button class="reveal-btn" id="rev-${q.id}" onclick="reveal(${q.id})" ${state?'disabled':''}>
      👁 Show Answer
    </button>`;

  return card;
}

// ─────────────────────────────────────────────
//  INTERACTIONS
// ─────────────────────────────────────────────
function choose(qid, chosen) {
  const q = questions.find(x => x.id === qid);
  if (answered[qid]) return;
  const correct = chosen === q.ans;
  answered[qid] = { chosen, correct };

  // style buttons
  q.opts.forEach((_, i) => {
    const btn = document.getElementById(`opt-${qid}-${i}`);
    btn.disabled = true;
    if (i === q.ans) btn.classList.add("correct");
    else if (i === chosen) btn.classList.add("wrong");
  });

  // feedback
  const fb = document.getElementById(`fb-${qid}`);
  fb.className = `feedback show ${correct ? 'correct-fb' : 'wrong-fb'}`;
  fb.innerHTML = correct
    ? '✅ Correct!'
    : `❌ Wrong — Correct answer: <b>${String.fromCharCode(65+q.ans)}</b>`;

  document.getElementById(`rev-${qid}`).disabled = true;
  updateScore();
}

function reveal(qid) {
  const q = questions.find(x => x.id === qid);
  if (answered[qid]) return;
  answered[qid] = { chosen: null, correct: false, revealed: true };

  q.opts.forEach((_, i) => {
    const btn = document.getElementById(`opt-${qid}-${i}`);
    btn.disabled = true;
    if (i === q.ans) btn.classList.add("correct");
  });

  const fb = document.getElementById(`fb-${qid}`);
  fb.className = "feedback show correct-fb";
  fb.innerHTML = `👁 Answer: <b>${String.fromCharCode(65+q.ans)} — ${q.opts[q.ans]}</b>`;
  document.getElementById(`rev-${qid}`).disabled = true;
  updateScore();
}

function revealAll() {
  const visible = getVisibleQuestions();
  visible.forEach(q => { if (!answered[q.id]) reveal(q.id); });
}

function resetAll() {
  answered = {};
  buildQuiz();
}

// ─────────────────────────────────────────────
//  FILTERS
// ─────────────────────────────────────────────
function filterTopic(topic) {
  currentTopic = topic;
  document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  buildQuiz();
}

function filterDifficulty() {
  currentDiff = document.getElementById("diff-filter").value;
  buildQuiz();
}

function getVisibleQuestions() {
  return questions.filter(q =>
    (currentTopic === "all" || q.topic === currentTopic) &&
    (currentDiff  === "all" || q.diff  === currentDiff)
  );
}

// ─────────────────────────────────────────────
//  SCORE
// ─────────────────────────────────────────────
function updateScore() {
  const visible    = getVisibleQuestions();
  const answeredVis = visible.filter(q => answered[q.id] && answered[q.id].chosen !== null);
  const correct    = answeredVis.filter(q => answered[q.id].correct).length;
  const wrong      = answeredVis.filter(q => !answered[q.id].correct).length;
  const totalAns   = visible.filter(q => answered[q.id]).length;
  const pct        = answeredVis.length ? Math.round(correct/answeredVis.length*100) : 0;

  document.getElementById("s-total").textContent    = visible.length;
  document.getElementById("s-correct").textContent  = correct;
  document.getElementById("s-wrong").textContent    = wrong;
  document.getElementById("s-pct").textContent      = pct + "%";
  document.getElementById("s-answered").textContent = totalAns;
  document.getElementById("s-visible").textContent  = visible.length;
  document.getElementById("progress-bar").style.width = (totalAns / visible.length * 100) + "%";
}

// ─────────────────────────────────────────────
//  ANSWER KEY
// ─────────────────────────────────────────────
function buildAnswerKey() {
  const grid = document.getElementById("key-grid");
  grid.innerHTML = "";
  const visible = getVisibleQuestions();
  visible.forEach(q => {
    const item = document.createElement("div");
    item.className = "key-item";
    item.innerHTML = `<b>Q${q.id}</b>${String.fromCharCode(65+q.ans)}`;
    grid.appendChild(item);
  });
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
buildQuiz();
</script>
