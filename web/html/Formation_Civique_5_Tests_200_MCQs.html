<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Formation Civique – 5 MCQ Tests (200 Questions)</title>
  <style>
    :root {
      --blue:   #002395;
      --red:    #ED2939;
      --white:  #FFFFFF;
      --light:  #f4f6fb;
      --card:   #ffffff;
      --border: #dde3f0;
      --text:   #1a1a2e;
      --muted:  #6b7280;
      --easy:   #16a34a;
      --medium: #d97706;
      --hard:   #dc2626;
      --correct:#16a34a;
      --wrong:  #dc2626;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--light); color: var(--text); min-height: 100vh; }

    header {
      background: linear-gradient(135deg, var(--blue) 0%, #1a3a8f 100%);
      color: var(--white); padding: 24px 24px 18px; text-align: center;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 3px 16px rgba(0,35,149,0.35);
    }
    header .flag { font-size: 2rem; margin-bottom: 4px; }
    header h1 { font-size: 1.4rem; font-weight: 700; }
    header p  { font-size: .85rem; opacity: .85; margin-top: 4px; }

    #scorebar {
      background: var(--white); border-bottom: 1px solid var(--border);
      padding: 10px 24px; display: flex; align-items: center; justify-content: center; gap: 28px;
      flex-wrap: wrap; font-size: .85rem; color: var(--muted);
      position: sticky; top: 88px; z-index: 99; box-shadow: var(--shadow);
    }
    #scorebar span { display: flex; align-items: center; gap: 5px; }
    #scorebar b { font-size: 1rem; }
    .s-correct b { color: var(--correct); }
    .s-wrong b { color: var(--wrong); }
    .s-total b { color: var(--blue); }
    .s-pct b { color: var(--blue); }

    #progress-wrap { background: #e5e7eb; height: 6px; width: 100%; }
    #progress-bar { height: 6px; background: linear-gradient(90deg, var(--blue), var(--red)); width: 0%; transition: width .4s ease; }

    /* TEST SELECTOR */
    #test-selector {
      display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
      padding: 18px 24px 6px; max-width: 900px; margin: 0 auto;
    }
    .test-btn {
      padding: 10px 22px; border-radius: 12px; border: 2px solid var(--blue);
      background: var(--white); color: var(--blue); font-size: .9rem; font-weight: 700;
      cursor: pointer; transition: all .25s;
    }
    .test-btn:hover, .test-btn.active { background: var(--blue); color: var(--white); transform: scale(1.05); }

    /* TOPIC TABS */
    #tabs {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 14px 24px 6px; max-width: 1100px; margin: 0 auto;
    }
    .tab-btn {
      padding: 6px 14px; border-radius: 20px; border: 2px solid var(--blue);
      background: var(--white); color: var(--blue); font-size: .78rem; font-weight: 600;
      cursor: pointer; transition: all .2s;
    }
    .tab-btn:hover, .tab-btn.active { background: var(--blue); color: var(--white); }

    #controls {
      display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
      padding: 6px 24px 14px; max-width: 1100px; margin: 0 auto;
    }
    #controls label { font-size: .83rem; color: var(--muted); }
    #diff-filter {
      padding: 5px 10px; border-radius: 8px; border: 1px solid var(--border);
      font-size: .83rem; color: var(--text);
    }
    #reset-btn {
      padding: 6px 16px; border-radius: 8px; border: none;
      background: var(--red); color: var(--white); font-size: .82rem; font-weight: 600;
      cursor: pointer; transition: background .2s; margin-left: auto;
    }
    #reset-btn:hover { background: #c0232f; }

    /* QUIZ */
    #quiz-container { max-width: 1100px; margin: 0 auto; padding: 0 20px 60px; }
    .section-title {
      font-size: 1.1rem; font-weight: 700; color: var(--blue);
      margin: 28px 0 14px; padding-bottom: 8px;
      border-bottom: 2px solid var(--blue); display: flex; align-items: center; gap: 8px;
    }
    .q-card {
      background: var(--card); border-radius: 14px; padding: 20px 22px;
      margin-bottom: 16px; border: 1px solid var(--border);
      box-shadow: var(--shadow); transition: border-color .3s;
    }
    .q-card.correct-card { border-color: var(--correct); }
    .q-card.wrong-card { border-color: var(--wrong); }
    .q-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
    .q-num { background: var(--blue); color: var(--white); border-radius: 8px; padding: 3px 10px; font-size: .78rem; font-weight: 700; }
    .q-diff {
      border-radius: 8px; padding: 3px 10px; font-size: .72rem; font-weight: 700; text-transform: uppercase;
    }
    .q-diff.easy { background: #dcfce7; color: var(--easy); }
    .q-diff.medium { background: #fef3c7; color: var(--medium); }
    .q-diff.hard { background: #fee2e2; color: var(--hard); }
    .q-text { font-size: 1rem; font-weight: 600; margin-bottom: 14px; line-height: 1.5; }
    .opts { display: flex; flex-direction: column; gap: 8px; }
    .opt-btn {
      width: 100%; text-align: left; padding: 12px 16px;
      border: 2px solid var(--border); border-radius: 10px;
      background: var(--white); font-size: .92rem; cursor: pointer;
      transition: all .2s; color: var(--text); line-height: 1.4;
    }
    .opt-btn:hover:not(.locked) { border-color: var(--blue); background: #eef2ff; }
    .opt-btn.selected-correct { border-color: var(--correct); background: #dcfce7; font-weight: 600; }
    .opt-btn.selected-wrong { border-color: var(--wrong); background: #fee2e2; }
    .opt-btn.show-correct { border-color: var(--correct); background: #dcfce7; }
    .opt-btn.locked { cursor: default; opacity: .85; }
    .explanation {
      margin-top: 10px; padding: 10px 14px; border-radius: 8px;
      font-size: .85rem; line-height: 1.5;
    }
    .explanation.correct-exp { background: #dcfce7; color: #166534; }
    .explanation.wrong-exp { background: #fee2e2; color: #991b1b; }
    .hidden { display: none !important; }

    /* RESULT MODAL */
    #result-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
      z-index: 200; justify-content: center; align-items: center;
    }
    #result-overlay.show { display: flex; }
    #result-box {
      background: var(--white); border-radius: 20px; padding: 40px;
      max-width: 420px; width: 90%; text-align: center; box-shadow: 0 8px 40px rgba(0,0,0,.2);
    }
    #result-box h2 { font-size: 1.5rem; color: var(--blue); margin: 10px 0; }
    #result-box .score-big { font-size: 3rem; font-weight: 800; color: var(--blue); }
    #result-box .score-label { font-size: 1rem; color: var(--muted); }
    #result-box .grade { font-size: 1.3rem; font-weight: 700; margin-top: 10px; }
    .grade.pass { color: var(--correct); }
    .grade.fail { color: var(--wrong); }
    #close-result {
      margin-top: 20px; padding: 10px 30px; border-radius: 10px; border: none;
      background: var(--blue); color: var(--white); font-size: 1rem;
      font-weight: 600; cursor: pointer;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 1.15rem; }
      .q-card { padding: 14px; }
      #test-selector { gap: 6px; }
      .test-btn { padding: 8px 14px; font-size: .8rem; }
    }
  </style>
</head>

<div id="quiz-container"></div>

<div id="result-overlay">

  { id:157, topic:"principles", diff:"medium", text:"Where is the motto 'Liberté, Égalité, Fraternité' typically displayed?", opts:["Only on currency","On the front of town halls, schools, and public buildings","Only on passports","Only in courtrooms"], ans:1 },
  { id:142, topic:"history", diff:"medium", text:"What are the DOM-TOM?", opts:["French political parties","French overseas territories (Guadeloupe, Martinique, Réunion, etc.)","French military bases","Historical provinces"], ans:1 },
  { id:191, topic:"history", diff:"easy", text:"Who was Charlemagne?", opts:["A French philosopher","A Frankish king and emperor who promoted education and unified much of Western Europe","A Roman emperor","A medieval pope"], ans:1 },
  { id:174, topic:"rights", diff:"medium", text:"What is Pôle Emploi (now France Travail)?", opts:["A political party","The public employment service that helps job seekers find work","A social security office","A tax office"], ans:1 },
  { id:42, topic:"rights", diff:"medium", text:"What is the principle of presumption of innocence in France?", opts:["All accused persons are considered guilty until proven innocent","All accused persons are considered innocent until proven guilty","Only French citizens benefit from this principle","It applies only to minor offenses"], ans:1 },
  { id:15, topic:"principles", diff:"easy", text:"What does the French Republic's principle of 'indivisibility' mean?", opts:["France cannot be divided into regions","All citizens are equal before the law with no distinctions based on origin","France has only one official language","The government cannot be divided into branches"], ans:1 }
]
];

const sections = [
  { key:"principles",   label:"Principles & Values",     icon:"🏛️" },
  { key:"institutional", label:"Institutional System",    icon:"⚖️" },
  { key:"rights",       label:"Rights & Duties",          icon:"📜" },
  { key:"history",      label:"History, Geography & Culture", icon:"🗺️" },
  { key:"parenthood",   label:"Parenthood",               icon:"👨‍👩‍👧" },
  { key:"review",       label:"Comprehensive Review",     icon:"🔄" },
];

let currentTest = 0;
let answered = {};
let currentTopic = "all";
let currentDiff = "all";

function getQuestions() { return allTests[currentTest]; }

function switchTest(idx) {
  currentTest = idx;
  answered = {};
  currentTopic = "all";
  currentDiff = "all";
  document.getElementById("diff-filter").value = "all";
  document.querySelectorAll(".test-btn").forEach((b, i) => b.classList.toggle("active", i === idx));
  buildQuiz();
  updateScore();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function buildQuiz() {
  const container = document.getElementById("quiz-container");
  container.innerHTML = "";
  const questions = getQuestions();

  // Build tabs
  const tabsDiv = document.getElementById("tabs");
  tabsDiv.innerHTML = "";
  const allBtn = document.createElement("button");
  allBtn.className = "tab-btn" + (currentTopic === "all" ? " active" : "");
  allBtn.textContent = "📋 All";
  allBtn.onclick = () => { currentTopic = "all"; buildQuiz(); };
  tabsDiv.appendChild(allBtn);

  const topicsInTest = [...new Set(questions.map(q => q.topic))];
  sections.forEach(sec => {
    if (!topicsInTest.includes(sec.key)) return;
    const btn = document.createElement("button");
    btn.className = "tab-btn" + (currentTopic === sec.key ? " active" : "");
    btn.textContent = sec.icon + " " + sec.label;
    btn.onclick = () => { currentTopic = sec.key; buildQuiz(); };
    tabsDiv.appendChild(btn);
  });

  // Filter
  const filtered = questions.filter(q =>
    (currentTopic === "all" || q.topic === currentTopic) &&
    (currentDiff === "all" || q.diff === currentDiff)
  );

  document.getElementById("sc-total").textContent = questions.length;

  // Group by topic
  const grouped = {};
  filtered.forEach(q => {
    if (!grouped[q.topic]) grouped[q.topic] = [];
    grouped[q.topic].push(q);
  });

  const order = sections.map(s => s.key);
  order.forEach(topic => {
    const qs = grouped[topic];
    if (!qs) return;
    const sec = sections.find(s => s.key === topic);

    const title = document.createElement("div");
    title.className = "section-title";
    title.innerHTML = sec.icon + " " + sec.label + ' <span style="font-size:.8rem;font-weight:400;color:#6b7280">(' + qs.length + ' questions)</span>';
    container.appendChild(title);

    qs.forEach((q, idx) => {
      const card = document.createElement("div");
      card.className = "q-card";
      card.id = "q-" + q.id;

      const state = answered[q.id];
      if (state) card.classList.add(state.correct ? "correct-card" : "wrong-card");

      card.innerHTML = '<div class="q-header">' +
        '<span class="q-num">Q' + q.id + '</span>' +
        '<span class="q-diff ' + q.diff + '">' + q.diff + '</span></div>' +
        '<div class="q-text">' + q.text + '</div>' +
        '<div class="opts">' + q.opts.map((o, oi) => {
          let cls = "opt-btn";
          if (state) {
            cls += " locked";
            if (oi === q.ans) cls += " show-correct";
            if (oi === state.chosen && !state.correct) cls += " selected-wrong";
            if (oi === state.chosen && state.correct) cls += " selected-correct";
          }
          return '<button class="' + cls + '" onclick="answer(' + q.id + ',' + oi + ')">' +
            String.fromCharCode(65 + oi) + ') ' + o + '</button>';
        }).join("") + '</div>';

      if (state) {
        const exp = document.createElement("div");
        exp.className = "explanation " + (state.correct ? "correct-exp" : "wrong-exp");
        exp.textContent = state.correct
          ? "✅ Correct!"
          : "❌ Wrong. The correct answer is: " + String.fromCharCode(65 + q.ans) + ") " + q.opts[q.ans];
        card.appendChild(exp);
      }

      container.appendChild(card);
    });
  });
}

function answer(qid, chosen) {
  if (answered[qid]) return;
  const q = getQuestions().find(x => x.id === qid);
  if (!q) return;
  answered[qid] = { chosen, correct: chosen === q.ans };
  buildQuiz();
  updateScore();

  // Check if all answered
  if (Object.keys(answered).length === getQuestions().length) {
    showResult();
  }
}

function updateScore() {
  const qs = getQuestions();
  const total = qs.length;
  const ans = Object.values(answered);
  const correct = ans.filter(a => a.correct).length;
  const wrong = ans.filter(a => !a.correct).length;
  const pct = ans.length ? Math.round(correct / ans.length * 100) : 0;

  document.getElementById("sc-correct").textContent = correct;
  document.getElementById("sc-wrong").textContent = wrong;
  document.getElementById("sc-answered").textContent = ans.length;
  document.getElementById("sc-total").textContent = total;
  document.getElementById("sc-pct").textContent = pct + "%";
  document.getElementById("progress-bar").style.width = (ans.length / total * 100) + "%";
}

function showResult() {
  const qs = getQuestions();
  const ans = Object.values(answered);
  const correct = ans.filter(a => a.correct).length;
  const pct = Math.round(correct / qs.length * 100);

  document.getElementById("res-score").textContent = correct + " / " + qs.length;
  document.getElementById("res-label").textContent = pct + "% correct";

  const gradeEl = document.getElementById("res-grade");
  if (pct >= 80) { gradeEl.textContent = "🎉 Excellent!"; gradeEl.className = "grade pass"; }
  else if (pct >= 60) { gradeEl.textContent = "👍 Good — keep practicing!"; gradeEl.className = "grade pass"; }
  else { gradeEl.textContent = "📚 Keep studying — you can do it!"; gradeEl.className = "grade fail"; }

  document.getElementById("result-overlay").classList.add("show");
}

function filterQuiz() {
  currentDiff = document.getElementById("diff-filter").value;
  buildQuiz();
}

function resetTest() {
  answered = {};
  buildQuiz();
  updateScore();
  window.scrollTo({ top: 0, behavior: "smooth" });
}

// Init
buildQuiz();
updateScore();
</script>
